<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A900;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a8a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6a6a6a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#goldGrad)" rx="24"/>
  
  <!-- Geometric background pattern - constructivist style -->
  <g opacity="0.08">
    <line x1="0" y1="0" x2="800" y2="600" stroke="#000" stroke-width="80"/>
    <line x1="800" y1="0" x2="0" y2="600" stroke="#000" stroke-width="80"/>
    <circle cx="400" cy="300" r="250" fill="none" stroke="#000" stroke-width="40"/>
    <circle cx="400" cy="300" r="150" fill="none" stroke="#000" stroke-width="20"/>
  </g>
  
  <!-- Left hand (human) - bold geometric -->
  <g transform="translate(180, 220)">
    <!-- Forearm -->
    <rect x="-60" y="60" width="180" height="70" rx="8" fill="#8B6914" opacity="0.9"/>
    <!-- Palm -->
    <rect x="80" y="40" width="100" height="100" rx="12" fill="#C4943D"/>
    <!-- Fingers reaching right -->
    <rect x="170" y="45" width="70" height="22" rx="6" fill="#C4943D"/>
    <rect x="175" y="72" width="75" height="22" rx="6" fill="#C4943D"/>
    <rect x="172" y="99" width="68" height="22" rx="6" fill="#C4943D"/>
    <rect x="160" y="125" width="50" height="18" rx="6" fill="#B8862D"/>
    <!-- Thumb -->
    <rect x="100" y="25" width="40" height="22" rx="6" fill="#D4A84A"/>
  </g>
  
  <!-- Right hand (machine) - angular metallic -->
  <g transform="translate(380, 220)">
    <!-- Forearm - mechanical -->
    <rect x="100" y="58" width="180" height="74" rx="4" fill="#555" stroke="#777" stroke-width="2"/>
    <rect x="120" y="62" width="40" height="10" rx="2" fill="#888"/>
    <rect x="180" y="62" width="40" height="10" rx="2" fill="#888"/>
    <rect x="240" y="62" width="30" height="10" rx="2" fill="#888"/>
    <!-- Joint rivets -->
    <circle cx="110" cy="75" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>
    <circle cx="110" cy="110" r="6" fill="#999" stroke="#666" stroke-width="1.5"/>
    <!-- Palm -->
    <rect x="20" y="38" width="100" height="105" rx="6" fill="#666" stroke="#888" stroke-width="2"/>
    <!-- Mechanical detail lines -->
    <line x1="30" y1="55" x2="110" y2="55" stroke="#888" stroke-width="1"/>
    <line x1="30" y1="80" x2="110" y2="80" stroke="#888" stroke-width="1"/>
    <line x1="30" y1="105" x2="110" y2="105" stroke="#888" stroke-width="1"/>
    <!-- Fingers reaching left - segmented -->
    <rect x="-50" y="42" width="35" height="24" rx="4" fill="#777" stroke="#999" stroke-width="1.5"/>
    <rect x="-12" y="42" width="40" height="24" rx="4" fill="#666" stroke="#888" stroke-width="1.5"/>
    <rect x="-55" y="70" width="35" height="24" rx="4" fill="#777" stroke="#999" stroke-width="1.5"/>
    <rect x="-17" y="70" width="45" height="24" rx="4" fill="#666" stroke="#888" stroke-width="1.5"/>
    <rect x="-48" y="98" width="35" height="24" rx="4" fill="#777" stroke="#999" stroke-width="1.5"/>
    <rect x="-10" y="98" width="38" height="24" rx="4" fill="#666" stroke="#888" stroke-width="1.5"/>
    <rect x="-30" y="125" width="40" height="20" rx="4" fill="#777" stroke="#999" stroke-width="1.5"/>
    <!-- Joint dots -->
    <circle cx="-14" cy="54" r="3" fill="#aaa"/>
    <circle cx="-19" cy="82" r="3" fill="#aaa"/>
    <circle cx="-12" cy="110" r="3" fill="#aaa"/>
  </g>
  
  <!-- Grip highlight - where hands meet -->
  <g transform="translate(350, 260)">
    <ellipse cx="0" cy="30" rx="35" ry="45" fill="#F5D623" opacity="0.3"/>
  </g>
</svg>